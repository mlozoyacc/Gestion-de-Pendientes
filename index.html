<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendientes PM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0f11;--surface:#16181c;--surface2:#1e2026;--border:#2a2d35;
  --accent:#e8c547;--accent2:#5b8def;--text:#e8e6e0;--muted:#6b6f7a;
  --done:#3a7d5c;--red:#e05252;--purple:#b06be8;
  --fh:'Syne',sans-serif;--fm:'DM Mono',monospace;--r:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--fm);font-size:13px;min-height:100vh;}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 20px;font-size:12px;color:var(--text);z-index:999;transition:transform .3s,opacity .3s;opacity:0;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.ok{border-color:#3a7d5c55;color:var(--done);}
.toast.err{border-color:#e0525255;color:var(--red);}

/* Loading */
.loading-overlay{position:fixed;inset:0;background:rgba(14,15,17,.88);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.loading-overlay.hidden{display:none;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:12px;color:var(--muted);}

/* Layout */
.main-panel{padding:24px 16px 60px;transition:margin-right .3s;}
.main-panel.shifted{margin-right:400px;}

/* Bitácora panel */
.bita-panel{position:fixed;top:0;right:0;width:400px;height:100vh;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s;z-index:200;}
.bita-panel.open{transform:translateX(0);}
.bita-hdr{padding:14px 16px 10px;border-bottom:1px solid var(--border);background:var(--surface2);flex-shrink:0;}
.bita-hdr-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;}
.bita-title{font-family:var(--fh);font-size:13px;font-weight:600;color:var(--text);flex:1;line-height:1.4;word-break:break-word;}
.bita-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0;}
.bita-close:hover{color:var(--text);}
.bita-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.bita-proj-tag{font-size:10px;color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:1px 8px;}

/* Timeline */
.bita-body{flex:1;overflow-y:auto;padding:16px;}
.timeline{position:relative;padding-left:22px;}
.timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:1px;background:var(--border);}
.tl-entry{position:relative;margin-bottom:16px;}
.tl-dot{position:absolute;left:-19px;top:5px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg);}
.dot-created{background:var(--accent2);}
.dot-comment,.dot-draft-saved{background:var(--muted);}
.dot-draft{background:var(--accent);box-shadow:0 0 0 3px rgba(232,197,71,.2);}
.dot-status{background:var(--accent);}
.dot-closed{background:var(--done);}
.dot-edited,.dot-desc-edit{background:var(--purple);}
.tl-date{font-size:10px;color:var(--muted);margin-bottom:4px;}
.tl-content{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;}
.tl-created .tl-content{border-color:#5b8def33;background:#5b8def08;}
.tl-closed  .tl-content{border-color:#3a7d5c44;background:#3a7d5c08;}
.tl-draft   .tl-content{border-color:var(--accent);background:rgba(232,197,71,.04);}
.tl-edited  .tl-content,.tl-desc-edit .tl-content{border-color:#b06be833;background:#b06be808;}
.tl-lbl{font-size:10px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;gap:6px;}
.tl-text{font-size:12px;line-height:1.6;color:var(--text);white-space:pre-wrap;word-break:break-word;}
.draft-badge{font-size:9px;background:rgba(232,197,71,.15);color:var(--accent);border:1px solid rgba(232,197,71,.3);border-radius:10px;padding:1px 6px;}

/* Draft controls */
.draft-comment-area{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--fm);font-size:12px;padding:6px 8px;resize:none;outline:none;line-height:1.5;transition:border-color .2s;min-height:52px;margin-top:6px;}
.draft-comment-area:focus{border-color:var(--accent);}
.draft-comment-area::placeholder{color:var(--muted);}
.draft-status-row{display:flex;align-items:center;gap:6px;margin-top:7px;}
.draft-lbl{font-size:10px;color:var(--muted);white-space:nowrap;}
.draft-sel{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--fm);font-size:11px;padding:4px 8px;outline:none;cursor:pointer;}
.draft-sel:focus{border-color:var(--accent);}
.draft-sel option{background:var(--surface2);}
.draft-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;}
.btn-guardar{background:var(--accent);color:#000;border:none;border-radius:var(--r);font-family:var(--fh);font-size:11px;font-weight:700;padding:5px 16px;cursor:pointer;transition:opacity .15s;}
.btn-guardar:hover{opacity:.85;}
.btn-descartar{background:none;border:1px solid var(--border);border-radius:var(--r);color:var(--muted);font-size:11px;padding:5px 12px;cursor:pointer;font-family:var(--fm);transition:all .15s;}
.btn-descartar:hover{border-color:var(--red);color:var(--red);}

/* Saved entry actions */
.tl-actions{display:none;gap:6px;justify-content:flex-end;margin-top:6px;}
.tl-entry:hover .tl-actions{display:flex;}
.tl-act-btn{background:none;border:1px solid var(--border);font-size:10px;color:var(--muted);cursor:pointer;padding:2px 8px;border-radius:3px;font-family:var(--fm);transition:all .15s;}
.tl-act-btn:hover{border-color:var(--accent);color:var(--accent);}
.tl-act-btn.del:hover{border-color:var(--red);color:var(--red);background:rgba(224,82,82,.08);}

/* Saved entry edit mode */
.saved-edit-area{width:100%;background:var(--surface);border:1px solid var(--accent);border-radius:6px;color:var(--text);font-family:var(--fm);font-size:12px;padding:6px 8px;resize:none;outline:none;line-height:1.5;min-height:52px;}
.saved-status-row{display:flex;align-items:center;gap:6px;margin-top:7px;}
.saved-sel{flex:1;background:var(--surface);border:1px solid var(--accent);border-radius:6px;color:var(--text);font-family:var(--fm);font-size:11px;padding:4px 8px;outline:none;cursor:pointer;}
.saved-sel option{background:var(--surface2);}
.saved-edit-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;}
.btn-save-edit{background:var(--accent);color:#000;border:none;border-radius:var(--r);font-family:var(--fh);font-size:11px;font-weight:700;padding:5px 16px;cursor:pointer;}
.btn-save-edit:hover{opacity:.85;}
.btn-cancel-edit{background:none;border:1px solid var(--border);border-radius:var(--r);color:var(--muted);font-size:11px;padding:5px 12px;cursor:pointer;font-family:var(--fm);}
.btn-cancel-edit:hover{border-color:var(--muted);}

/* Footer */
.bita-footer{padding:12px 16px 14px;border-top:1px solid var(--border);background:var(--surface2);flex-shrink:0;}
.bita-footer-lbl{font-size:10px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;}
.bita-new-row{display:flex;gap:8px;}
.bita-new-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--fm);font-size:12px;padding:7px 10px;outline:none;transition:border-color .2s;}
.bita-new-input:focus{border-color:var(--accent);}
.bita-new-input::placeholder{color:var(--muted);font-size:11px;}
.btn-agregar{background:var(--surface);color:var(--accent);border:1px solid var(--accent);border-radius:var(--r);font-family:var(--fh);font-size:11px;font-weight:700;padding:7px 16px;cursor:pointer;white-space:nowrap;transition:all .15s;}
.btn-agregar:hover{background:var(--accent);color:#000;}
.bita-footer-hint{font-size:10px;color:var(--muted);margin-top:5px;}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.header-left h1{font-family:var(--fh);font-size:22px;font-weight:700;letter-spacing:-.5px;color:var(--accent);}
.header-left .date-tag{font-size:11px;color:var(--muted);margin-top:2px;}
.stats{display:flex;gap:12px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:6px 14px;text-align:center;}
.stat .num{font-family:var(--fh);font-size:18px;font-weight:700;color:var(--accent);}
.stat .lbl{font-size:10px;color:var(--muted);}
.toolbar{display:flex;gap:8px;margin-bottom:16px;}
.toolbar input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--fm);font-size:12px;padding:8px 12px;outline:none;transition:border-color .2s;}
.toolbar input:focus{border-color:var(--accent);}
.toolbar input::placeholder{color:var(--muted);}
.btn{background:var(--accent);color:#000;border:none;border-radius:var(--r);font-family:var(--fh);font-size:12px;font-weight:600;padding:8px 16px;cursor:pointer;transition:opacity .15s;white-space:nowrap;}
.btn:hover{opacity:.85;}
.btn.sec{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn.sec:hover{border-color:var(--accent);}
.filters{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
.filter-btn{font-family:var(--fm);font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;}
.filter-btn.active,.filter-btn:hover{border-color:var(--accent);color:var(--accent);}

/* Projects & tasks */
.proj-group{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden;transition:border-color .2s;}
.proj-group:hover{border-color:#3a3d47;}
.proj-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none;background:var(--surface2);}
.proj-hdr:hover{background:#22252d;}
.proj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.proj-name{font-family:var(--fh);font-size:13px;font-weight:600;flex:1;color:var(--text);}
.proj-count{font-size:11px;color:var(--muted);}
.chevron{color:var(--muted);font-size:11px;transition:transform .2s;}
.proj-group.collapsed .chevron{transform:rotate(-90deg);}
.proj-group.collapsed .tasks-list{display:none;}
.del-proj{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;line-height:1;}
.del-proj:hover{color:var(--red);background:rgba(224,82,82,.1);}
.tasks-list{padding:6px 0;}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:8px 14px;border-bottom:1px solid #1c1e24;cursor:pointer;transition:background .15s;}
.task-item:last-child{border-bottom:none;}
.task-item:hover{background:rgba(255,255,255,.025);}
.task-item.active-task{background:rgba(232,197,71,.04);border-left:2px solid var(--accent);padding-left:12px;}
.task-cb{margin-top:3px;width:14px;height:14px;accent-color:var(--done);cursor:pointer;flex-shrink:0;}
.task-body{flex:1;min-width:0;}
.task-text{font-size:12px;line-height:1.5;color:var(--text);word-break:break-word;}
.task-item.done .task-text{text-decoration:line-through;color:var(--muted);}
.task-meta{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap;align-items:center;}
.status-badge{font-size:10px;padding:1px 7px;border-radius:20px;border:1px solid;font-family:var(--fm);white-space:nowrap;cursor:default;}
.badge-pending   {color:#e8c547;border-color:#e8c54755;background:#e8c54710;}
.badge-inprogress{color:var(--accent2);border-color:#5b8def55;background:#5b8def10;}
.badge-blocked   {color:var(--red);border-color:#e0525255;background:#e0525210;}
.badge-done      {color:var(--done);border-color:#3a7d5c55;background:#3a7d5c10;}
.task-date{font-size:10px;color:var(--muted);}
.comment-pill{font-size:10px;color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:0 7px;}
.draft-pill{font-size:10px;color:var(--accent);border:1px solid rgba(232,197,71,.35);border-radius:20px;padding:0 7px;background:rgba(232,197,71,.07);}
.task-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s;flex-shrink:0;}
.task-item:hover .task-actions{opacity:1;}
.icon-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;line-height:1;color:var(--muted);}
.icon-btn:hover{background:var(--surface2);color:var(--red);}
.icon-btn.edit:hover{color:var(--accent);}
.task-text-input{width:100%;background:var(--surface2);border:1px solid var(--accent);border-radius:5px;color:var(--text);font-family:var(--fm);font-size:12px;padding:3px 8px;outline:none;}
.edit-hint{font-size:10px;color:var(--muted);margin-left:4px;opacity:0;transition:opacity .15s;}
.task-item:hover .edit-hint{opacity:1;}
.add-task-row{display:flex;gap:6px;padding:8px 14px;border-top:1px solid var(--border);background:rgba(255,255,255,.01);}
.add-task-row input{flex:1;background:transparent;border:none;color:var(--text);font-family:var(--fm);font-size:12px;outline:none;}
.add-task-row input::placeholder{color:var(--border);}
.add-task-tiny{background:none;border:1px solid var(--border);border-radius:5px;color:var(--muted);font-size:11px;padding:2px 8px;cursor:pointer;font-family:var(--fm);transition:all .15s;}
.add-task-tiny:hover{border-color:var(--accent);color:var(--accent);}
.prog-bar{height:3px;background:var(--border);border-radius:2px;margin:0 14px 8px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;background:var(--done);transition:width .4s;}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:340px;max-width:95vw;}
.modal h2{font-family:var(--fh);font-size:16px;margin-bottom:16px;color:var(--accent);}
.modal input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--fm);font-size:12px;padding:8px 12px;outline:none;margin-bottom:10px;transition:border-color .2s;}
.modal input:focus{border-color:var(--accent);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
.color-pal{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.color-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;}
.color-dot:hover,.color-dot.sel{transform:scale(1.2);border-color:#fff;}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:12px;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-txt" id="loading-txt">Conectando con Supabase...</div>
</div>
<div class="toast" id="toast"></div>

<!-- MAIN -->
<div class="main-panel" id="main-panel">
  <div class="header">
    <div class="header-left">
      <h1>// Pendientes PM</h1>
      <div class="date-tag" id="current-date"></div>
    </div>
    <div class="stats">
      <div class="stat"><div class="num" id="stat-total">0</div><div class="lbl">total</div></div>
      <div class="stat"><div class="num" id="stat-done">0</div><div class="lbl">resueltos</div></div>
      <div class="stat"><div class="num" id="stat-pending">0</div><div class="lbl">activos</div></div>
    </div>
  </div>
  <div class="toolbar">
    <input type="text" id="search-input" placeholder="Buscar pendientes...">
    <button class="btn sec" onclick="openModal()">+ Proyecto</button>
    <button class="btn" onclick="exportData()">Exportar</button>
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('pending',this)">⏳ Pendiente</button>
    <button class="filter-btn" onclick="setFilter('inprogress',this)">🔄 En progreso</button>
    <button class="filter-btn" onclick="setFilter('blocked',this)">🚫 Bloqueado</button>
    <button class="filter-btn" onclick="setFilter('done',this)">✅ Resuelto</button>
  </div>
  <div id="projects-container"></div>
</div>

<!-- BITÁCORA -->
<div class="bita-panel" id="bita-panel">
  <div class="bita-hdr">
    <div class="bita-hdr-top">
      <div class="bita-title" id="bita-title">—</div>
      <button class="bita-close" onclick="closeBita()">✕</button>
    </div>
    <div class="bita-meta" id="bita-meta"></div>
  </div>
  <div class="bita-body" id="bita-body">
    <div class="timeline" id="bita-timeline"></div>
  </div>
  <div class="bita-footer">
    <div class="bita-footer-lbl">Nuevo avance / comentario</div>
    <div class="bita-new-row">
      <input type="text" class="bita-new-input" id="bita-new-input"
        placeholder="Escribe el avance o comentario..."
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();agregarDraft();}">
      <button class="btn-agregar" onclick="agregarDraft()">+ Agregar</button>
    </div>
    <div class="bita-footer-hint">Enter para agregar · Edita antes de Guardar sin generar historial</div>
  </div>
</div>

<!-- Modal proyecto -->
<div class="overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>Nuevo proyecto</h2>
    <input type="text" id="modal-name" placeholder="Nombre del proyecto" maxlength="60">
    <div class="color-pal" id="color-pal"></div>
    <div class="modal-btns">
      <button class="btn sec" onclick="closeModal()">Cancelar</button>
      <button class="btn" onclick="addProject()">Crear</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// SUPABASE — REST directo con JWT
// ══════════════════════════════════════════
const SB_URL = 'https://vzathimuvcuzpbzngacr.supabase.co/rest/v1';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6YXRoaW11dmN1enBiem5nYWNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NzY2MTUsImV4cCI6MjA5MDA1MjYxNX0.WPsfIZ5QUQWhZEB7yvEc7QZRJcVU5FDznCvXmDzaaDE';

const H = {
  'Content-Type':  'application/json',
  'apikey':        SB_KEY,
  'Authorization': `Bearer ${SB_KEY}`
};

async function fetchWithTimeout(url, options, ms = 10000) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(url, { ...options, signal: ctrl.signal });
    return r;
  } finally {
    clearTimeout(timer);
  }
}

async function sbGet(table, qs = '') {
  const url = `${SB_URL}/${table}${qs ? '?' + qs : ''}`;
  const r = await fetchWithTimeout(url, { headers: H });
  if (!r.ok) throw new Error(`GET ${table} [${r.status}]: ${await r.text()}`);
  return r.json();
}

async function sbPost(table, body) {
  const r = await fetchWithTimeout(`${SB_URL}/${table}`, {
    method:  'POST',
    headers: { ...H, 'Prefer': 'return=representation' },
    body:    JSON.stringify(body)
  });
  if (!r.ok) throw new Error(`POST ${table} [${r.status}]: ${await r.text()}`);
  const data = await r.json();
  return Array.isArray(data) ? data : [data];
}

async function sbPatch(table, id, body) {
  const r = await fetchWithTimeout(`${SB_URL}/${table}?id=eq.${id}`, {
    method:  'PATCH',
    headers: { ...H, 'Prefer': 'return=representation' },
    body:    JSON.stringify(body)
  });
  if (!r.ok) throw new Error(`PATCH ${table} [${r.status}]: ${await r.text()}`);
  const data = await r.json();
  return Array.isArray(data) ? data : [data];
}

async function sbDelete(table, id) {
  const r = await fetchWithTimeout(`${SB_URL}/${table}?id=eq.${id}`, {
    method:  'DELETE',
    headers: H
  });
  if (!r.ok) throw new Error(`DELETE ${table} [${r.status}]: ${await r.text()}`);
}

async function initSupabase() { /* no-op, REST directo */ }

// ══════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════
const COLORS = ['#e8c547','#5b8def','#e05252','#3a7d5c','#b06be8','#e8834f','#5cd4c4','#e85c90'];
const SL = { pending:'Pendiente', inprogress:'En progreso', blocked:'Bloqueado', done:'Resuelto' };
const ICONS = { created:'🆕', comment:'💬', status:'🔁', closed:'✅', edited:'✏️', 'desc-edit':'✏️' };

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let projects = [];   // in-memory cache from Supabase
let drafts   = {};   // { task_id: [{text, status}] }  — never sent to DB until Guardar

let activeFilter = 'all';
let selColor = COLORS[0];
let activePid = null, activeTid = null;

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function fmtDate(str) {
  if (!str) return '';
  const s = str.replace('T',' ').slice(0,16);
  const [dt,tm] = s.split(' ');
  const [y,m,d] = dt.split('-');
  const mon = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(d)} ${mon[parseInt(m)-1]} ${y}${tm ? ' · '+tm : ''}`;
}

function getProj(pid) { return projects.find(p => p.id === pid); }
function getTask(pid, tid) { const p = getProj(pid); return { p, t: p?.tasks?.find(t => t.id === tid) }; }

let _toastTimer = null;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = 'toast'; }, 2800);
}

function loading(show, txt='Cargando...') {
  document.getElementById('loading-overlay').classList.toggle('hidden', !show);
  document.getElementById('loading-txt').textContent = txt;
}

// ══════════════════════════════════════════
// LOAD DATA FROM SUPABASE
// ══════════════════════════════════════════
async function loadAll() {
  loading(true, 'Conectando con Supabase...');
  try {
    await initSupabase();
    loading(true, 'Cargando datos...');

    const [projs, tasks, logs] = await Promise.all([
      sbGet('projects',    'order=id.asc'),
      sbGet('tasks',       'order=id.asc'),
      sbGet('log_entries', 'saved=eq.true&order=id.asc')
    ]);

    projects = projs.map(p => ({
      ...p,
      collapsed: p.collapsed || false,
      tasks: tasks
        .filter(t => t.project_id === p.id)
        .map(t => ({
          ...t,
          log: logs.filter(l => l.task_id === t.id)
        }))
    }));
  } catch(e) {
    console.error('[loadAll] Error:', e);
    loading(false);
    // Show error with retry button in main area
    document.getElementById('projects-container').innerHTML = `
      <div class="empty" style="padding:40px 20px">
        <div style="color:var(--red);margin-bottom:12px;font-size:13px">
          ⚠️ Error al conectar con Supabase
        </div>
        <div style="color:var(--muted);font-size:11px;margin-bottom:16px;word-break:break-all">
          ${esc(e.message)}
        </div>
        <button class="btn" onclick="loadAll().then(()=>render())" style="font-size:11px;padding:6px 16px">
          🔄 Reintentar
        </button>
      </div>`;
    return;
  } finally {
    loading(false);
  }
}

// ══════════════════════════════════════════
// STATS & FILTER
// ══════════════════════════════════════════
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); render();
}
function updateStats() {
  let tot=0, dn=0;
  projects.forEach(p => (p.tasks||[]).forEach(t => { tot++; if(t.done) dn++; }));
  document.getElementById('stat-total').textContent   = tot;
  document.getElementById('stat-done').textContent    = dn;
  document.getElementById('stat-pending').textContent = tot - dn;
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const c = document.getElementById('projects-container');
  c.innerHTML = '';
  const fil = projects.filter(p =>
    p.name.toLowerCase().includes(search) ||
    (p.tasks||[]).some(t => t.text.toLowerCase().includes(search))
  );
  if (!fil.length) {
    c.innerHTML = '<div class="empty">Sin proyectos. Crea uno con "+ Proyecto".</div>';
    updateStats(); return;
  }
  fil.forEach(p => c.appendChild(buildProject(p, search)));
  updateStats();
  if (activeTid) {
    const el = document.getElementById(`task-${activeTid}`);
    if (el) el.classList.add('active-task');
  }
}

function buildProject(proj, search) {
  const vis = (proj.tasks||[]).filter(t => {
    const mf = activeFilter==='all' || t.status===activeFilter;
    const ms = !search || t.text.toLowerCase().includes(search) || proj.name.toLowerCase().includes(search);
    return mf && ms;
  });
  const tot = (proj.tasks||[]).length;
  const dn  = (proj.tasks||[]).filter(t => t.done).length;
  const pct = tot ? Math.round(dn/tot*100) : 0;

  const div = document.createElement('div');
  div.className = 'proj-group' + (proj.collapsed ? ' collapsed' : '');
  div.innerHTML = `
    <div class="proj-hdr" onclick="toggleProj(${proj.id})">
      <div class="proj-dot" style="background:${proj.color}"></div>
      <span class="proj-name">${esc(proj.name)}</span>
      <span class="proj-count">${dn}/${tot}</span>
      <button class="del-proj" onclick="event.stopPropagation();delProj(${proj.id})">×</button>
      <span class="chevron">▾</span>
    </div>
    <div class="tasks-list">
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      ${vis.length===0
        ? '<div class="empty" style="padding:14px">Sin pendientes en este filtro</div>'
        : vis.map(t => buildTask(t, proj.id)).join('')}
      <div class="add-task-row">
        <input type="text" placeholder="+ Agregar pendiente..." id="newtask-${proj.id}"
          onkeydown="if(event.key==='Enter')addTask(${proj.id})">
        <button class="add-task-tiny" onclick="addTask(${proj.id})">Agregar</button>
      </div>
    </div>`;
  return div;
}

function buildTask(t, pid) {
  const isActive = t.id === activeTid;
  const cls = ['task-item', t.done?'done':'', isActive?'active-task':''].filter(Boolean).join(' ');
  const savedComments = (t.log||[]).filter(e => e.type==='comment').length;
  const draftCount = (drafts[t.id]||[]).length;
  return `
    <div class="${cls}" id="task-${t.id}" onclick="openBita(${pid},${t.id},event)">
      <input type="checkbox" class="task-cb" ${t.done?'checked':''} onclick="event.stopPropagation()"
        onchange="toggleDone(${pid},${t.id})">
      <div class="task-body">
        <div class="task-text"
          ondblclick="event.stopPropagation();startEditText(${pid},${t.id},this)"
          title="Clic → bitácora · Doble clic → editar">${esc(t.text)}<span class="edit-hint">✎</span></div>
        <div class="task-meta">
          <span class="status-badge badge-${t.status}">${SL[t.status]}</span>
          <span class="task-date">${fmtDate(t.created_at)}</span>
          ${savedComments>0 ? `<span class="comment-pill">💬 ${savedComments}</span>` : ''}
          ${draftCount>0    ? `<span class="draft-pill">⏳ ${draftCount} sin guardar</span>` : ''}
        </div>
      </div>
      <div class="task-actions">
        <button class="icon-btn edit" title="Editar texto"
          onclick="event.stopPropagation();startEditText(${pid},${t.id},document.querySelector('#task-${t.id} .task-text'))">✎</button>
        <button class="icon-btn" title="Eliminar"
          onclick="event.stopPropagation();delTask(${pid},${t.id})">✕</button>
      </div>
    </div>`;
}

// ══════════════════════════════════════════
// BITÁCORA PANEL
// ══════════════════════════════════════════
function openBita(pid, tid, evt) {
  if (evt && evt.target.closest('.task-actions,.task-cb')) return;
  activePid = pid; activeTid = tid;
  const {p, t} = getTask(pid, tid); if (!t) return;
  document.getElementById('bita-title').textContent = t.text;
  refreshMeta(p, t);
  renderTimeline(t);
  document.getElementById('bita-panel').classList.add('open');
  document.getElementById('main-panel').classList.add('shifted');
  document.querySelectorAll('.task-item').forEach(el => el.classList.remove('active-task'));
  const el = document.getElementById(`task-${tid}`); if (el) el.classList.add('active-task');
  document.getElementById('bita-new-input').value = '';
  setTimeout(() => document.getElementById('bita-new-input').focus(), 320);
}
function closeBita() {
  activePid=null; activeTid=null;
  document.getElementById('bita-panel').classList.remove('open');
  document.getElementById('main-panel').classList.remove('shifted');
  document.querySelectorAll('.task-item').forEach(el => el.classList.remove('active-task'));
}
function refreshMeta(p, t) {
  document.getElementById('bita-meta').innerHTML =
    `<span class="status-badge badge-${t.status}">${SL[t.status]}</span>
     <span class="bita-proj-tag">${esc(p.name)}</span>`;
}

// ══════════════════════════════════════════
// TIMELINE RENDERER
// ══════════════════════════════════════════
function renderTimeline(t) {
  const tl = document.getElementById('bita-timeline');
  const taskDrafts = drafts[t.id] || [];
  const allEntries = [
    ...(t.log || []).map(e => ({ ...e, _draft: false })),
    ...taskDrafts.map((d, i) => ({ ...d, _draft: true, _draftIdx: i }))
  ];

  if (!allEntries.length) {
    tl.innerHTML = '<div class="empty" style="padding:20px 0">Sin actividad aún.</div>';
    return;
  }

  tl.innerHTML = allEntries.map((e, i) => {
    const isDraft = e._draft;
    const icon = ICONS[e.type] || '·';
    const dotCls = isDraft ? 'dot-draft' : `dot-${e.type}`;
    const entryCls = `tl-entry ${isDraft ? 'tl-draft' : 'tl-'+e.type}`;
    const dateLbl = isDraft
      ? `<span class="draft-badge">Sin guardar</span>`
      : fmtDate(e.created_at);

    let body = '';

    if (isDraft) {
      const di = e._draftIdx;
      const statOpts = `<option value="">— sin cambio —</option>` +
        Object.entries(SL).map(([v,l]) =>
          `<option value="${v}"${e.status===v?' selected':''}>${l}</option>`
        ).join('');
      body = `
        <div class="tl-lbl">💬 Avance / Comentario <span class="draft-badge">Sin guardar</span></div>
        <textarea class="draft-comment-area" id="draft-txt-${di}"
          placeholder="Comentario (opcional si cambias estatus)"
          oninput="updateDraft(${di},'text',this.value)">${esc(e.text)}</textarea>
        <div class="draft-status-row">
          <span class="draft-lbl">Estatus:</span>
          <select class="draft-sel" id="draft-sel-${di}"
            onchange="updateDraft(${di},'status',this.value)">
            ${statOpts}
          </select>
        </div>
        <div class="draft-btns">
          <button class="btn-descartar" onclick="descartarDraft(${di})">Descartar</button>
          <button class="btn-guardar" onclick="guardarDraft(${di})">Guardar</button>
        </div>`;
    }
    else if (e.type === 'created') {
      body = `<div class="tl-lbl">${icon} Creado</div>
              <div class="tl-text">${esc(e.text||'Pendiente creado')}</div>`;
    }
    else if (e.type === 'comment') {
      const statLine = e.status
        ? `<div style="margin-top:5px"><span class="status-badge badge-${e.status}">${SL[e.status]||e.status}</span></div>`
        : '';
      body = `<div class="tl-lbl">${icon} Avance / Comentario</div>
              <div class="tl-text">${esc(e.text)}</div>
              ${statLine}
              <div class="tl-actions">
                <button class="tl-act-btn" onclick="startEditSaved(${e.id})">✎ Modificar</button>
                <button class="tl-act-btn del" onclick="delEntry(${e.id})">✕ Eliminar</button>
              </div>`;
    }
    else if (e.type === 'status') {
      const from = e.from_status ? SL[e.from_status]+' → ' : '';
      body = `<div class="tl-lbl">${icon} Cambio de estatus</div>
              <div class="tl-text">${esc(from)}${esc(SL[e.to_status]||e.to_status)}</div>`;
    }
    else if (e.type === 'closed') {
      body = `<div class="tl-lbl">${icon} Pendiente cerrado</div>
              <div class="tl-text">Marcado como Resuelto</div>`;
    }
    else if (e.type === 'edited') {
      body = `<div class="tl-lbl">${icon} Comentario modificado</div>
              <div class="tl-text">${esc(e.text)}</div>`;
    }
    else if (e.type === 'desc-edit') {
      body = `<div class="tl-lbl">✏️ Descripción editada</div>
              <div class="tl-text">${esc(e.text)}</div>`;
    }

    return `
      <div class="${entryCls}" id="tl-entry-${i}">
        <div class="tl-dot ${dotCls}"></div>
        <div class="tl-date">${dateLbl}</div>
        <div class="tl-content" id="tl-content-${i}">${body}</div>
      </div>`;
  }).join('');

  const body = document.getElementById('bita-body');
  setTimeout(() => { body.scrollTop = body.scrollHeight; }, 40);
}

// ══════════════════════════════════════════
// DRAFT FLOW (memory only until Guardar)
// ══════════════════════════════════════════
function agregarDraft() {
  const input = document.getElementById('bita-new-input');
  const text  = input.value.trim();
  if (!activeTid) return;
  if (!drafts[activeTid]) drafts[activeTid] = [];
  drafts[activeTid].push({ type:'comment', text: text, status: '' });
  input.value = '';
  const {t} = getTask(activePid, activeTid);
  if (t) { renderTimeline(t); render(); }
}

function updateDraft(draftIdx, field, val) {
  if (!drafts[activeTid] || !drafts[activeTid][draftIdx]) return;
  drafts[activeTid][draftIdx][field] = val;
  // no DB write, no re-render needed — textarea/select already reflect the value
}

async function guardarDraft(draftIdx) {
  const draft = drafts[activeTid]?.[draftIdx];
  if (!draft) return;

  // Pull latest values from DOM in case oninput didn't fire
  const ta  = document.getElementById(`draft-txt-${draftIdx}`);
  const sel = document.getElementById(`draft-sel-${draftIdx}`);
  if (ta)  draft.text   = ta.value.trim();
  if (sel) draft.status = sel.value;

  // Necesita al menos texto O cambio de estatus
  if (!draft.text && !draft.status) {
    toast('Agrega un comentario o selecciona un estatus.', 'err'); return;
  }

  const {p, t} = getTask(activePid, activeTid);
  if (!t) return;

  loading(true, 'Guardando...');
  try {
    // 1. Solo insertar comentario si hay texto
    if (draft.text) {
      const [logEntry] = await sbPost('log_entries', {
        task_id:     t.id,
        type:        'comment',
        text:        draft.text,
        status:      draft.status || '',
        from_status: '',
        to_status:   '',
        saved:       true
      });
      t.log.push(logEntry);
    }

    // 2. Si hay cambio de estatus, aplicarlo
    if (draft.status && draft.status !== t.status) {
      const prev = t.status;
      await sbPatch('tasks', t.id, { status: draft.status, done: draft.status==='done' });
      t.status = draft.status;
      t.done   = draft.status === 'done';

      const [statusEntry] = await sbPost('log_entries', {
        task_id:     t.id,
        type:        'status',
        text:        '',
        status:      draft.status,
        from_status: prev,
        to_status:   draft.status,
        saved:       true
      });
      t.log.push(statusEntry);

      if (draft.status === 'done') {
        const [closedEntry] = await sbPost('log_entries', {
          task_id:     t.id,
          type:        'closed',
          text:        '',
          status:      'done',
          from_status: '',
          to_status:   'done',
          saved:       true
        });
        t.log.push(closedEntry);
      }
    }

    // Remove draft from memory
    drafts[activeTid].splice(draftIdx, 1);
    if (drafts[activeTid].length === 0) delete drafts[activeTid];

    refreshMeta(p, t);
    renderTimeline(t);
    render();
    toast('Guardado correctamente ✓');
  } catch(e) {
    toast('Error al guardar: ' + e.message, 'err');
  } finally {
    loading(false);
  }
}

function descartarDraft(draftIdx) {
  if (!drafts[activeTid]) return;
  drafts[activeTid].splice(draftIdx, 1);
  if (drafts[activeTid].length === 0) delete drafts[activeTid];
  const {t} = getTask(activePid, activeTid);
  if (t) { renderTimeline(t); render(); }
}

// ══════════════════════════════════════════
// EDIT SAVED ENTRY (generates new log record)
// ══════════════════════════════════════════
function startEditSaved(entryId) {
  const {t} = getTask(activePid, activeTid); if (!t) return;
  const e = t.log.find(x => x.id === entryId); if (!e) return;

  // Find the DOM content element by scanning tl-content divs
  const allContents = document.querySelectorAll('[id^="tl-content-"]');
  let contentEl = null;
  allContents.forEach(el => {
    if (el.innerHTML.includes(`onclick="startEditSaved(${entryId})`)) contentEl = el;
  });
  if (!contentEl) return;

  const curStat = e.status || '';
  const statOpts = `<option value="">— sin cambio —</option>` +
    Object.entries(SL).map(([v,l]) =>
      `<option value="${v}"${curStat===v?' selected':''}>${l}</option>`
    ).join('');

  contentEl.innerHTML = `
    <div class="tl-lbl">💬 Avance / Comentario</div>
    <textarea class="saved-edit-area" id="saved-edit-txt">${esc(e.text)}</textarea>
    <div class="saved-status-row">
      <span class="draft-lbl">Estatus:</span>
      <select class="saved-sel" id="saved-edit-sel">${statOpts}</select>
    </div>
    <div class="saved-edit-btns">
      <button class="btn-cancel-edit" onclick="renderTimeline(getTask(${activePid},${activeTid}).t)">Cancelar</button>
      <button class="btn-save-edit" onclick="confirmarEdicion(${entryId})">Guardar</button>
    </div>`;

  const ta = document.getElementById('saved-edit-txt');
  ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length);
}

async function confirmarEdicion(entryId) {
  const {p, t} = getTask(activePid, activeTid); if (!t) return;
  const e = t.log.find(x => x.id === entryId); if (!e) return;

  const ta  = document.getElementById('saved-edit-txt');
  const sel = document.getElementById('saved-edit-sel');
  const newText = ta  ? ta.value.trim()  : e.text;
  const newStat = sel ? sel.value        : e.status;

  const textChanged = newText !== e.text;
  const statChanged = newStat !== (e.status||'');
  if (!textChanged && !statChanged) { renderTimeline(t); return; }

  loading(true, 'Guardando cambio...');
  try {
    let histLines = [];

    // Update the original comment entry
    const patchBody = {};
    if (textChanged) { patchBody.text   = newText; histLines.push(`Comentario: "${e.text.slice(0,60)}…" → "${newText.slice(0,60)}…"`); }
    if (statChanged) { patchBody.status = newStat;  histLines.push(`Estatus comentario: ${e.status?SL[e.status]:'(ninguno)'} → ${newStat?SL[newStat]:'(ninguno)'}`); }
    await sbPatch('log_entries', entryId, patchBody);
    Object.assign(e, patchBody);

    // Apply task status change if needed
    if (newStat && newStat !== t.status) {
      const prev = t.status;
      await sbPatch('tasks', t.id, { status: newStat, done: newStat==='done' });
      t.status = newStat; t.done = newStat==='done';

      const [sEntry] = await sbPost('log_entries', {
        task_id:t.id, type:'status', text:'',
        status:newStat, from_status:prev, to_status:newStat, saved:true
      });
      t.log.push(sEntry);

      if (newStat==='done') {
        const [cEntry] = await sbPost('log_entries', {
          task_id:t.id, type:'closed', text:'',
          status:'done', from_status:'', to_status:'done', saved:true
        });
        t.log.push(cEntry);
      }
    }

    // Insert 'edited' audit record
    const [editEntry] = await sbPost('log_entries', {
      task_id:     t.id,
      type:        'edited',
      text:        histLines.join('\n'),
      status:      '',
      from_status: '',
      to_status:   '',
      saved:       true
    });
    t.log.push(editEntry);

    refreshMeta(p, t);
    renderTimeline(t);
    render();
    toast('Cambio guardado ✓');
  } catch(err) {
    toast('Error: ' + err.message, 'err');
  } finally {
    loading(false);
  }
}

async function delEntry(entryId) {
  if (!confirm('¿Eliminar esta entrada de la bitácora?')) return;
  const {t} = getTask(activePid, activeTid); if (!t) return;
  loading(true, 'Eliminando...');
  try {
    await sbDelete('log_entries', entryId);
    t.log = t.log.filter(e => e.id !== entryId);
    renderTimeline(t); render();
    toast('Entrada eliminada');
  } catch(e) {
    toast('Error: ' + e.message, 'err');
  } finally {
    loading(false);
  }
}

// ══════════════════════════════════════════
// TASK ACTIONS
// ══════════════════════════════════════════
async function toggleDone(pid, tid) {
  const {t} = getTask(pid, tid); if (!t) return;
  const prev   = t.status;
  t.done       = !t.done;
  t.status     = t.done ? 'done' : 'pending';
  loading(true, 'Actualizando...');
  try {
    await sbPatch('tasks', tid, { done: t.done, status: t.status });
    const [sEntry] = await sbPost('log_entries', {
      task_id:t.id, type:'status', text:'',
      status:t.status, from_status:prev, to_status:t.status, saved:true
    });
    t.log.push(sEntry);
    if (t.done) {
      const [cEntry] = await sbPost('log_entries', {
        task_id:t.id, type:'closed', text:'',
        status:'done', from_status:'', to_status:'done', saved:true
      });
      t.log.push(cEntry);
    }
    render();
    if (activeTid===tid) {
      const {p} = getTask(pid,tid);
      refreshMeta(p,t); renderTimeline(t);
    }
  } catch(e) {
    // revert
    t.done=!t.done; t.status=prev;
    toast('Error: '+e.message,'err');
  } finally {
    loading(false);
  }
}

async function toggleProj(pid) {
  const p = getProj(pid); if (!p) return;
  p.collapsed = !p.collapsed;
  try { await sbPatch('projects', pid, { collapsed: p.collapsed }); } catch(e) {}
  render();
}

async function addTask(pid) {
  const inp  = document.getElementById(`newtask-${pid}`);
  const text = inp.value.trim();
  console.log('[addTask] pid:', pid, '| text:', text, '| inp:', inp);
  if (!text) { console.warn('[addTask] texto vacío, saliendo'); return; }
  const p = getProj(pid);
  console.log('[addTask] proyecto encontrado:', p);
  if (!p) { console.warn('[addTask] proyecto no encontrado para pid:', pid); return; }
  loading(true, 'Creando pendiente...');
  try {
    console.log('[addTask] enviando POST tasks...');
    const rows = await sbPost('tasks', { project_id: pid, text, status:'pending', done:false });
    console.log('[addTask] respuesta tasks:', rows);
    const task = rows[0];
    const logRows = await sbPost('log_entries', {
      task_id:task.id, type:'created', text:'Pendiente creado',
      status:'', from_status:'', to_status:'', saved:true
    });
    console.log('[addTask] respuesta log_entries:', logRows);
    task.log = [logRows[0]];
    p.tasks.push(task);
    render(); inp.value='';
    toast('Pendiente creado ✓');
  } catch(e) {
    console.error('[addTask] ERROR:', e);
    toast('Error: '+e.message,'err');
  } finally {
    loading(false);
  }
}

async function delTask(pid, tid) {
  if (!confirm('¿Eliminar este pendiente?')) return;
  const p = getProj(pid); if (!p) return;
  loading(true, 'Eliminando...');
  try {
    await sbDelete('tasks', tid); // cascade deletes log_entries
    p.tasks = p.tasks.filter(t => t.id !== tid);
    delete drafts[tid];
    if (activeTid===tid) closeBita();
    render(); toast('Pendiente eliminado');
  } catch(e) {
    toast('Error: '+e.message,'err');
  } finally {
    loading(false);
  }
}

async function startEditText(pid, tid, el) {
  if (!el || el.querySelector('input')) return;
  const {t} = getTask(pid, tid); if (!t) return;
  const input = document.createElement('input');
  input.type='text'; input.className='task-text-input'; input.value=t.text;
  const commit = async () => {
    const val = input.value.trim();
    if (val && val !== t.text) {
      const prev = t.text; t.text = val;
      loading(true,'Guardando...');
      try {
        await sbPatch('tasks', tid, { text: val });
        const [le] = await sbPost('log_entries', {
          task_id:tid, type:'desc-edit',
          text:`Antes: ${prev}\nAhora: ${val}`,
          status:'', from_status:'', to_status:'', saved:true
        });
        t.log.push(le);
        if (activeTid===tid) {
          document.getElementById('bita-title').textContent=val;
          renderTimeline(t);
        }
        toast('Descripción actualizada ✓');
      } catch(e) { t.text=prev; toast('Error: '+e.message,'err'); }
      finally { loading(false); }
    }
    render();
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key==='Enter') { e.preventDefault(); input.blur(); }
    if (e.key==='Escape') { input.removeEventListener('blur',commit); render(); }
  });
  el.innerHTML=''; el.appendChild(input); input.focus(); input.select();
}

// ══════════════════════════════════════════
// PROJECTS
// ══════════════════════════════════════════
async function addProject() {
  const name = document.getElementById('modal-name').value.trim();
  if (!name) { document.getElementById('modal-name').focus(); return; }
  loading(true, 'Creando proyecto...');
  try {
    const [proj] = await sbPost('projects', { name, color: selColor, collapsed: false });
    proj.tasks = [];
    projects.push(proj);
    render(); closeModal(); toast('Proyecto creado ✓');
  } catch(e) {
    toast('Error: '+e.message,'err');
  } finally {
    loading(false);
  }
}

async function delProj(pid) {
  if (!confirm('¿Eliminar este proyecto y todos sus pendientes?')) return;
  const p = getProj(pid); if (!p) return;
  loading(true, 'Eliminando...');
  try {
    await sbDelete('projects', pid); // cascade deletes tasks + log_entries
    if (p.tasks.some(t=>t.id===activeTid)) closeBita();
    projects = projects.filter(x => x.id !== pid);
    render(); toast('Proyecto eliminado');
  } catch(e) {
    toast('Error: '+e.message,'err');
  } finally {
    loading(false);
  }
}

// ══════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-name').value='';
  selColor=COLORS[0]; renderPalette();
  setTimeout(()=>document.getElementById('modal-name').focus(),100);
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function renderPalette() {
  document.getElementById('color-pal').innerHTML = COLORS.map(c =>
    `<div class="color-dot${c===selColor?' sel':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}
function pickColor(c) { selColor=c; renderPalette(); }

// ══════════════════════════════════════════
// EXPORT
// ══════════════════════════════════════════
function exportData() {
  const lines = [`PENDIENTES PM — ${new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'})}\n`];
  projects.forEach(p => {
    lines.push(`\n▸ ${p.name}`);
    (p.tasks||[]).forEach(t => {
      const mk = t.done?'✅':t.status==='inprogress'?'🔄':t.status==='blocked'?'🚫':'⏳';
      lines.push(`\n  ${mk} ${t.text} [${SL[t.status]}]`);
      (t.log||[]).forEach(e => {
        if(e.type==='created')   lines.push(`     📌 ${fmtDate(e.created_at)} — Creado`);
        if(e.type==='comment')   lines.push(`     💬 ${fmtDate(e.created_at)} — ${e.text}${e.status?' ['+SL[e.status]+']':''}`);
        if(e.type==='edited')    lines.push(`     ✏️  ${fmtDate(e.created_at)} — ${e.text}`);
        if(e.type==='status')    lines.push(`     🔁 ${fmtDate(e.created_at)} — ${SL[e.from_status]||e.from_status} → ${SL[e.to_status]||e.to_status}`);
        if(e.type==='closed')    lines.push(`     ✅ ${fmtDate(e.created_at)} — Cerrado`);
        if(e.type==='desc-edit') lines.push(`     ✏️  ${fmtDate(e.created_at)} — ${e.text.replace(/\n/g,' | ')}`);
      });
    });
  });
  const blob = new Blob([lines.join('\n')], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`pendientes-${new Date().toISOString().split('T')[0]}.txt`; a.click();
}
